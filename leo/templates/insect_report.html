{% extends "base.html" %}

{% block title %}Insect Report{% endblock %}

{% block content %}

<h2>Insect Report</h2>

<table border="1" cellpadding="10" cellspacing="0">

    <tr>
        <th>Insect</th>
        <th>Locations Seen</th>
        <th>Total Observations</th>
    </tr>

    {% for insect in insects %}
    <tr>
        <td>{{ insect[0] }}</td>
        <td>{{ insect[1] }}</td>
        <td>{{ insect[2] }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
